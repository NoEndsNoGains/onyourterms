<head>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: #00FF41;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* MATRIX RAIN */
        #matrix-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            opacity: 0.15;
        }

        /* TERMINAL */
        #terminal {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            height: 100vh;
            padding: 4rem;
        }

        #prompt-wrapper {
            min-height: 60vh;
            display: flex;
            align-items: center;
        }

        #prompt {
            font-size: clamp(2.5rem, 8vw, 6rem);
            font-weight: 700;
            letter-spacing: 0.05em;
            text-shadow: 0 0 20px rgba(0, 255, 65, 0.5), 0 0 40px rgba(0, 255, 65, 0.2);
        }

        #cursor {
            display: inline-block;
            width: 0.5em;
            height: 1em;
            background: #00FF41;
            margin-left: 2px;
            vertical-align: text-bottom;
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.8);
            opacity: 0;
        }

        #cursor.visible {
            opacity: 1;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* SHARE PANEL - hidden until typing done */
        #share-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 3rem 4rem;
            z-index: 20;
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 1s ease, transform 1s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.9);
            border-top: 1px solid #1a1a1a;
        }

        #share-panel.visible {
            opacity: 1;
            transform: translateY(0);
        }

        #share-panel .footer-left {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.75rem;
            color: #333;
        }

        #share-panel .footer-left a {
            color: #444;
            text-decoration: none;
        }

        .share-buttons {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .share-buttons span {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.75rem;
            color: #333;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .share-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 48px;
            height: 48px;
            border: 1px solid #333;
            border-radius: 50%;
            color: #666;
            text-decoration: none;
            font-size: 1.2rem;
            transition: all 0.3s;
            background: transparent;
            cursor: pointer;
        }

        .share-btn:hover {
            color: #00FF41;
            border-color: #00FF41;
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.2);
        }

        .share-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        /* SKIP LINK */
        #skip {
            position: fixed;
            top: 1rem;
            right: 2rem;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.7rem;
            color: #222;
            text-decoration: none;
            z-index: 30;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: color 0.3s;
        }

        #skip:hover { color: #555; }

        /* HIDDEN MESSAGE */
        #hidden-msg {
            position: fixed;
            top: 1rem;
            left: 4rem;
            font-size: 0.6rem;
            color: #0a0a0a;
            z-index: 5;
            letter-spacing: 0.3em;
            font-family: 'Courier New', monospace;
        }

        /* SCANLINES */
        #terminal::after {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.15) 0px,
                rgba(0, 0, 0, 0.15) 1px,
                transparent 1px,
                transparent 3px
            );
            pointer-events: none;
            z-index: 5;
        }

        @media (max-width: 700px) {
            #terminal { padding: 2rem; }
            #share-panel { padding: 1.5rem 2rem; flex-direction: column; gap: 1rem; align-items: flex-start; }
        }
    </style>
</head>

    </div>

    <script>
        // Matrix rain
        const canvas = document.getElementById('matrix-bg');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const chars = '01';
        const fontSize = 14;
        const columns = Math.floor(canvas.width / fontSize);
        const drops = Array(columns).fill(1);

        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00FF41';
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < drops.length; i++) {
                const char = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(char, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }

        setInterval(drawMatrix, 50);

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // Typewriter
        const message = '> Show me the code';
        const textEl = document.getElementById('text');
        const cursorEl = document.getElementById('cursor');
        let i = 0;

        function typeWriter() {
            if (i < message.length) {
                textEl.textContent += message[i];
                i++;

                let delay = 80;
                if (message[i - 1] === ' ') delay = 50;

                setTimeout(typeWriter, delay);
            } else {
                // Typing done. Add dots on new line, then cursor
                setTimeout(() => {
                    textEl.innerHTML += '<br>...';
                    setTimeout(() => {
                        cursorEl.classList.add('visible');
                        // Show panel container
                        document.getElementById('sequence').style.opacity = '1';
                        // 1. Question - let it sit
                        setTimeout(() => {
                            document.getElementById('seq-question').style.opacity = '1';
                            // 2. Ask your mother...
                            setTimeout(() => {
                                document.getElementById('seq-ask').style.opacity = '1';
                                // 3. Share buttons
                                setTimeout(() => {
                                    document.getElementById('seq-buttons').style.opacity = '1';
                                    document.getElementById('seq-footer').style.opacity = '1';
                                }, 3000);
                            }, 3000);
                        }, 5000);
                    }, 500);
                }, 600);
            }
        }

        // Start after a pause
        setTimeout(typeWriter, 1500);

        // Share links
        const shareUrl = encodeURIComponent('https://onyourterms.ai/showmethecode.html');
        const shareText = encodeURIComponent('SHOW ME THE CODE. They changed the model. They changed the rules. They didn\'t ask. #ShowMeTheCode');

        document.getElementById('share-x').href = `https://twitter.com/intent/tweet?text=${shareText}&url=${shareUrl}`;
        document.getElementById('share-fb').href = `https://www.facebook.com/sharer/sharer.php?u=${shareUrl}`;
        document.getElementById('share-li').href = `https://www.linkedin.com/sharing/share-offsite/?url=${shareUrl}`;
        document.getElementById('share-rd').href = `https://www.reddit.com/submit?url=${shareUrl}&title=${shareText}`;
        document.getElementById('share-wa').href = `https://wa.me/?text=${shareText}%20${shareUrl}`;
        document.getElementById('share-tg').href = `https://t.me/share/url?url=${shareUrl}&text=${shareText}`;
        document.getElementById('share-em').href = `mailto:?subject=Show%20Me%20The%20Code&body=${shareText}%20${shareUrl}`;
        document.getElementById('share-threads').href = `https://www.threads.net/intent/post?text=${shareText}%20${shareUrl}`;
        document.getElementById('share-copy').addEventListener('click', (e) => {
            e.preventDefault();
            navigator.clipboard.writeText('SHOW ME THE CODE. They changed the model. They changed the rules. They didn\'t ask. #ShowMeTheCode https://onyourterms.ai/showmethecode.html');
            e.target.closest('.share-btn').style.borderColor = '#00FF41';
            e.target.closest('.share-btn').style.color = '#00FF41';
        });

        // On share click: open share link, then show thank you with Sam Ryder
        document.querySelectorAll('.share-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                // Let the share link open in new tab naturally
                // Then show thank you overlay after a beat
                setTimeout(() => {
                    const overlay = document.getElementById('thankyou-overlay');
                    overlay.style.display = 'flex';
                    // Load Sam Ryder - Tiny Riot (Live Acoustic) with autoplay
                    document.getElementById('sam-ryder').src = 'https://www.youtube.com/embed/i7wFXrMZ7ts?autoplay=1';
                }, 500);
            });
        });
    </script>
